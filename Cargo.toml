[workspace]
resolver = "2"
members = ["knack"]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.80"
authors = ["Knack <hi@getknack.ai>"]
license = "MIT"
repository = "https://github.com/knack-ai/knack"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
tokio = { version = "1.42", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
keyring = "3"
webbrowser = "1"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
console = "0.15"
indicatif = "0.17"
dirs = "5"
