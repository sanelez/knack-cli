name: publish-types

# Publish the knack-types crate to crates.io. Triggered on tags matching
# `knack-types-v<X.Y.Z>` so the types crate versions independently from
# the CLI binary.
#
# Requires a CRATES_IO_TOKEN secret with publish rights on knack-types.

on:
  push:
    tags:
      - "knack-types-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. knack-types-v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish knack-types to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p knack-types
